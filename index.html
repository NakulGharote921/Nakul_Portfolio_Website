            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[style*="FILL' 1"], .icon-fill {

        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #dce2f7;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c0c8cc;
        }
        .typing-effect::after {
            content: "Python";
            animation: textReveal 8s infinite;
            color: #2c687b;
        }
        @keyframes textReveal {
            0%, 20% { content: "Python"; }
            25%, 45% { content: "AI/ML"; }
            50%, 70% { content: "Web Dev"; }
            75%, 95% { content: "Java"; }
            100% { content: "Python"; }
        }
        .fade-in-section {
            opacity: 1;
            transform: translateY(0);
        }
